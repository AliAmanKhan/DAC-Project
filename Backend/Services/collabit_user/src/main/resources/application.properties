spring.application.name=demo
#DB config
spring.datasource.url=jdbc:mysql://localhost:3309/collabit_user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=collabit_user
spring.datasource.password=collabit_user_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
#default server port 8080
#server.port=9090

# AWS S3 Configuration
# Allow tests and local runs without setting env vars by providing empty defaults
aws.access-key=
aws.secret-key=
aws.region=ap-south-1
aws.s3.bucket-name=collabit-user-media